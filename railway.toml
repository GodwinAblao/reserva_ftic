# Railway deploy config — https://docs.railway.com/reference/config-as-code
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "php bin/console doctrine:migrations:migrate --no-interaction --env=prod && php bin/console asset-map:compile --env=prod && php -S 0.0.0.0:$PORT -t public public/index.php"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
