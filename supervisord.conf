[supervisord]
nodaemon=true
user=root

[program:fastapi]
command=python -m uvicorn app:app --host 0.0.0.0 --port 8002
directory=/app/analytics
autostart=true
autorestart=true
stdout_logfile=/tmp/fastapi.log
stderr_logfile=/tmp/fastapi_error.log

[program:php]
command=php -S 0.0.0.0:8080 -t public
directory=/app
autostart=true
autorestart=true
stdout_logfile=/tmp/php.log
stderr_logfile=/tmp/php_error.log
